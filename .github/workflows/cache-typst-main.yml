name: Cache Typst main

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: typst-bin
          key: typst-main

      - name: Install Rust
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Typst from main
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/typst/typst.git
          cd typst
          cargo build --release
          mkdir -p ../typst-bin
          cp target/release/typst ../typst-bin/

      - name: Verify binary
        run: typst-bin/typst --version
name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Restore Typst cache
        uses: actions/cache@v4
        with:
          path: typst-bin
          key: typst-main
    
      - name: Restore fonts cache
        uses: actions/cache@v4
        with:
          path: fonts-bin
          key: fonts

      - name: Add Typst to PATH
        run: |
          chmod +x typst-bin/typst
          echo "$PWD/typst-bin" >> $GITHUB_PATH
          echo "TYPST_FONT_PATH=$PWD/fonts-bin" >> $GITHUB_ENV

      - name: Build site
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
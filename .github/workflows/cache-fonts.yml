name: Cache fonts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # weekly, every Sunday

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: fonts-bin
          key: fonts

      - name: Download Iosevka
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p fonts-bin
          URL=$(curl -s https://api.github.com/repos/be5invis/Iosevka/releases/latest \
            | jq -r '.assets[] | .browser_download_url' \
            | grep 'PkgTTF-Iosevka-' \
            | head -1)
          echo "Downloading: $URL"
          curl -L "$URL" -o iosevka.zip
          unzip iosevka.zip -d fonts-bin/
          rm iosevka.zip